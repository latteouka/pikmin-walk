<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pikmin Walker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }
    #app { display: grid; grid-template-columns: 1fr 420px; height: 100vh; }
    #map { height: 100%; background: #ddd; }
    .leaflet-container { font-family: inherit; }

    #side {
      padding: 20px;
      background: var(--panel);
      overflow-y: auto;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    h1 { font-size: 18px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
    h1 .dot { color: var(--accent); }
    .section { display: flex; flex-direction: column; gap: 8px; }
    .section h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0;
      letter-spacing: 0.08em;
    }
    select, button {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: all 0.15s;
    }
    select:hover, select:focus { border-color: var(--accent); }
    button { cursor: pointer; font-weight: 500; }
    button:hover:not(:disabled) { background: var(--border); }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    button.primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    button.danger {
      background: var(--danger);
      border-color: var(--danger);
      color: white;
    }
    button.danger:hover:not(:disabled) {
      background: var(--danger-hover);
      border-color: var(--danger-hover);
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-row { display: flex; gap: 8px; }
    .btn-row > * { flex: 1; }

    #waypoints {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 180px;
      overflow-y: auto;
    }
    #waypoints:empty::after {
      content: "點地圖新增路線點";
      display: block;
      padding: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      background: var(--panel-2);
      border-radius: 6px;
      border: 1px dashed var(--border);
    }
    #waypoints li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-family: ui-monospace, "SF Mono", monospace;
    }
    #waypoints li .num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-weight: 600;
      text-align: center;
      line-height: 20px;
      font-family: inherit;
      font-size: 11px;
      flex-shrink: 0;
    }
    #waypoints li .coords { flex: 1; color: var(--muted); }
    #waypoints li button {
      width: 24px;
      height: 24px;
      padding: 0;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 14px;
    }
    #waypoints li button:hover { color: var(--danger); background: transparent; }

    #device-info {
      padding: 10px 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #device-info.ok { border-color: var(--success); color: var(--success); }
    #device-info.err { border-color: var(--danger); color: var(--danger); }
    #device-info .indicator {
      width: 8px; height: 8px; border-radius: 50%;
      background: currentColor;
    }

    #status {
      padding: 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-family: ui-monospace, "SF Mono", monospace;
      color: var(--muted);
      min-height: 40px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #status.running { border-color: var(--accent); color: var(--text); }
    #status.done { border-color: var(--success); color: var(--success); }
    #status.error { border-color: var(--danger); color: var(--danger); }

    .wp-marker {
      background: var(--accent);
      color: white;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      border: 2px solid white;
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }
    .mode-toggle button {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--muted);
      font-weight: 500;
      transition: all 0.15s;
    }
    .mode-toggle button.active {
      background: var(--accent);
      color: white;
    }
    .mode-toggle button:not(.active):hover {
      background: var(--border);
      color: var(--text);
    }

    .jump-row {
      display: flex;
      gap: 6px;
    }
    .jump-row input {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .jump-row input:focus { border-color: var(--accent); }
    .jump-row input::placeholder { color: var(--muted); }
    .jump-row button {
      flex: 0 0 auto;
      width: auto;
      padding: 10px 18px;
    }

    #bookmarks {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: 160px;
      overflow-y: auto;
    }
    #bookmarks:empty { display: none; }
    #bookmarks li {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    #bookmarks li:hover { border-color: var(--accent); }
    #bookmarks li .bk-name {
      flex: 1; color: var(--text); font-weight: 500;
      background: transparent; border: none; outline: none;
      font-family: inherit; font-size: 12px; font-weight: 500;
      padding: 2px 4px; border-radius: 3px; cursor: pointer;
      min-width: 0;
    }
    #bookmarks li .bk-name:focus {
      background: var(--bg); cursor: text;
      border: 1px solid var(--accent);
    }
    #bookmarks li .bk-coords { color: var(--muted); font-family: ui-monospace, monospace; font-size: 11px; white-space: nowrap; }
    #bookmarks li button {
      width: 20px; height: 20px; padding: 0;
      background: transparent; border: none;
      color: var(--muted); font-size: 13px; cursor: pointer;
      flex-shrink: 0;
    }
    #bookmarks li button:hover { color: var(--danger); background: transparent; }

    .layer-control {
      position: absolute; top: 10px; right: 10px; z-index: 1000;
      display: flex; gap: 4px;
      background: rgba(30,41,59,0.85); padding: 4px; border-radius: 8px;
      backdrop-filter: blur(8px);
    }
    .layer-control button {
      padding: 6px 10px; font-size: 11px; font-weight: 500;
      background: transparent; border: 1px solid var(--border);
      border-radius: 5px; color: var(--muted); cursor: pointer;
      width: auto;
    }
    .layer-control button.active {
      background: var(--accent); border-color: var(--accent); color: white;
    }
  </style>
</head>
<body>
<div id="app">
  <div style="position:relative;">
    <div id="map"></div>
    <div class="layer-control" id="layerControl">
      <button data-layer="google" class="active">Google</button>
      <button data-layer="satellite">衛星</button>
      <button data-layer="osm">OSM</button>
    </div>
  </div>
  <aside id="side">
    <h1><span class="dot">●</span> Pikmin Walker</h1>
    <div id="device-info">
      <span class="indicator"></span>
      <span id="device-text">正在連線…</span>
    </div>

    <div class="section">
      <h2>🎯 瞬移到</h2>
      <div class="jump-row">
        <input type="text" id="jumpInput" placeholder="地名或 lat, lon" />
        <button id="jumpButton" class="primary">GO</button>
      </div>
      <div class="jump-row" style="margin-top: 4px;">
        <input type="text" id="bookmarkName" placeholder="書籤名稱（自訂）" />
        <button id="bookmarkAdd" title="加入書籤">★ 存</button>
      </div>
      <div class="hint">先在上方輸入地名/座標按 GO 瞬移，再取個名字按 ★ 存書籤</div>
      <ul id="bookmarks"></ul>
    </div>

    <select id="profile" style="display:none;"></select>

    <div class="section">
      <h2>漫步半徑</h2>
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="range" id="radiusSlider" min="10" max="5000" value="1000" step="10" style="flex:1;accent-color:var(--accent);">
        <span id="radiusVal" style="font-family:ui-monospace,monospace;font-size:13px;font-weight:600;min-width:60px;">1000 m</span>
      </div>
      <div class="hint">移動中可即時調整</div>
    </div>

    <div class="section">
      <h2>速度</h2>
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="range" id="speedSlider" min="3" max="25" value="14" step="1" style="flex:1;accent-color:var(--accent);">
        <span id="speedVal" style="font-family:ui-monospace,monospace;font-size:13px;font-weight:600;min-width:60px;">14 km/h</span>
      </div>
      <div class="hint">移動中可即時調整</div>
    </div>

    <div class="section">
      <div class="btn-row">
        <button id="start" class="primary">▶ 開始</button>
        <button id="stop" class="danger" disabled>■ 停止</button>
      </div>
      <div class="btn-row">
        <button id="clearLoc">回到真實 GPS</button>
      </div>
    </div>

    <div class="section">
      <h2>狀態</h2>
      <div id="status">idle</div>
    </div>

    <a href="/walk" style="
      display: block; text-align: center; padding: 12px;
      margin-top: auto;
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--accent); text-decoration: none;
      font-size: 14px; font-weight: 500;
    ">🚶 道路漫步模式 →</a>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
//
// ---- Map setup ----
//
const map = L.map('map', { zoomControl: true }).setView([25.0330, 121.5654], 13);

// Tile layers
const tileLayers = {
  google: L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
    maxZoom: 21,
    attribution: 'Google Maps',
  }),
  satellite: L.tileLayer('https://mt1.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
    maxZoom: 21,
    attribution: 'Google Satellite',
  }),
  osm: L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors',
  }),
};
let currentTileLayer = tileLayers.google;
currentTileLayer.addTo(map);

document.getElementById('layerControl').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-layer]');
  if (!btn) return;
  const key = btn.dataset.layer;
  if (!tileLayers[key] || tileLayers[key] === currentTileLayer) return;
  map.removeLayer(currentTileLayer);
  currentTileLayer = tileLayers[key];
  currentTileLayer.addTo(map);
  document.querySelectorAll('#layerControl button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
});

//
// ---- State ----
//
const trailLine = L.polyline([], {
  color: '#ef4444', weight: 4, opacity: 0.9,
}).addTo(map);
let deviceMarker = null;

// Random-walk visual aid: translucent circle showing home tether
let rwalkCircle = null;
let profilesMeta = {};

function currentProfileMeta() {
  return profilesMeta[document.getElementById('profile').value] || {};
}

function updateRwalkCircle() {
  const meta = currentProfileMeta();
  const radiusInput = document.getElementById('radiusSlider');
  const radius = radiusInput ? parseInt(radiusInput.value) : (meta.max_radius_m || 1000);
  if (rwalkCircle) { map.removeLayer(rwalkCircle); rwalkCircle = null; }
  if (!meta.is_random_walk) return;
  const anchor = deviceMarker ? deviceMarker.getLatLng() : null;
  if (!anchor) return;
  rwalkCircle = L.circle(anchor, {
    radius: radius,
    color: '#10b981', weight: 2,
    fillColor: '#10b981', fillOpacity: 0.08,
    dashArray: '4,6',
  }).addTo(map);
}

function resetTrail() {
  trailLine.setLatLngs([]);
}

// Map click: drop blue marker + fill jump input (teleport via GO button)
let clickMarker = null;
map.on('click', (e) => {
  const ll = [e.latlng.lat, e.latlng.lng];
  if (clickMarker) {
    clickMarker.setLatLng(ll);
  } else {
    clickMarker = L.circleMarker(ll, {
      radius: 8, color: '#fff', weight: 2,
      fillColor: '#3b82f6', fillOpacity: 1,
    }).addTo(map);
  }
  document.getElementById('jumpInput').value =
    `${e.latlng.lat.toFixed(6)}, ${e.latlng.lng.toFixed(6)}`;
});

function teleportTo(lat, lon) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    setStatus('WebSocket 未連線', 'error');
    return;
  }
  ws.send(JSON.stringify({ type: 'teleport', lat, lon }));
}

//
// ---- Jump input: accepts a place name or a "lat, lon" pair ----
// Place names go through Nominatim (OpenStreetMap's free geocoder).
// Nominatim usage policy: max 1 req/s, include valid UA. The browser
// supplies its own User-Agent, so we're fine for local interactive use.
//
async function handleJumpInput() {
  const raw = document.getElementById('jumpInput').value.trim();
  if (!raw) return;

  // Try "lat, lon" or "lat lon" first — fast path, no network
  const m = raw.match(/^(-?\d{1,3}(?:\.\d+)?)\s*[,\s]\s*(-?\d{1,3}(?:\.\d+)?)$/);
  if (m) {
    const lat = parseFloat(m[1]);
    const lon = parseFloat(m[2]);
    if (Number.isFinite(lat) && Number.isFinite(lon)
        && lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) {
      teleportTo(lat, lon);
      map.setView([lat, lon], 15);
      setStatus(`瞬移到 ${lat.toFixed(5)}, ${lon.toFixed(5)}`);
      return;
    }
  }

  // Fall back to geocoding
  setStatus(`查「${raw}」…`);
  try {
    const url = 'https://nominatim.openstreetmap.org/search'
      + `?format=json&limit=1&q=${encodeURIComponent(raw)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const hits = await res.json();
    if (!hits.length) {
      setStatus(`找不到「${raw}」`, 'error');
      return;
    }
    const hit = hits[0];
    const lat = parseFloat(hit.lat);
    const lon = parseFloat(hit.lon);
    teleportTo(lat, lon);
    map.setView([lat, lon], 15);
    // Pre-fill bookmark name with the search term for easy ★ saving
    document.getElementById('bookmarkName').value = raw;
    setStatus(`瞬移到 ${hit.display_name}`);
  } catch (err) {
    setStatus(`geocode 失敗: ${err.message}`, 'error');
  }
}

// Single marker showing where the server last told the phone to be.
// Separate from trailLine (which only accumulates during a simulation run).
function updateDeviceMarker(lat, lon, { pan = false } = {}) {
  const ll = [lat, lon];
  if (!deviceMarker) {
    deviceMarker = L.circleMarker(ll, {
      radius: 9,
      color: '#ffffff',
      weight: 2,
      fillColor: '#ef4444',
      fillOpacity: 1,
    }).addTo(map);
  } else {
    deviceMarker.setLatLng(ll);
  }
  if (pan) map.panTo(ll, { animate: true });
}

//
// ---- UI elements ----
//
const $status = document.getElementById('status');
const $device = document.getElementById('device-info');
const $deviceText = document.getElementById('device-text');
const $start = document.getElementById('start');
const $stop = document.getElementById('stop');
const $profile = document.getElementById('profile');

function setStatus(text, cls = '') {
  $status.textContent = text;
  $status.className = cls;
}

function setDevice(device) {
  if (device) {
    $deviceText.textContent = `已連線 ${device.product}`;
    $device.className = 'ok';
  } else {
    $deviceText.textContent = '未連線 — 先跑 sudo pymobiledevice3 remote tunneld';
    $device.className = 'err';
  }
}

//
// ---- WebSocket ----
//
let ws;
function connectWS() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => setStatus('連線 ok');
  ws.onclose = () => {
    setStatus('WebSocket 斷線，3 秒後重連', 'error');
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => setStatus('WebSocket error', 'error');
  ws.onmessage = (ev) => handleMessage(JSON.parse(ev.data));
}

function handleMessage(m) {
  switch (m.type) {
    case 'hello':
      setDevice(m.device);
      if (m.last_position) {
        updateDeviceMarker(m.last_position.lat, m.last_position.lon, { pan: true });
        map.setView([m.last_position.lat, m.last_position.lon], 14);
        // Auto re-push to phone so the app has a GPS fix immediately
        ws.send(JSON.stringify({
          type: 'teleport',
          lat: m.last_position.lat,
          lon: m.last_position.lon,
        }));
        setStatus(`位置已同步 ${m.last_position.lat.toFixed(5)}, ${m.last_position.lon.toFixed(5)}`);
      }
      break;
    case 'teleported':
      updateDeviceMarker(m.lat, m.lon, { pan: true });
      setStatus(`✓ 瞬移到 ${m.lat.toFixed(5)}, ${m.lon.toFixed(5)}`, 'done');
      break;
    case 'started':
      setStatus(`running • ${m.label} • ${(m.total_m / 1000).toFixed(2)} km`, 'running');
      $start.disabled = true;
      $stop.disabled = false;
      resetTrail();
      break;
    case 'tick': {
      updateDeviceMarker(m.lat, m.lon);
      trailLine.addLatLng([m.lat, m.lon]);
      const note = m.note ? ` [${m.note}]` : '';
      const dwell = m.dwell > 0 ? ` dwell=${m.dwell.toFixed(0)}s` : '';
      setStatus(
        `t=${m.elapsed.toFixed(0)}s\n${m.lat.toFixed(6)}, ${m.lon.toFixed(6)}${note}${dwell}`,
        'running'
      );
      break;
    }
    case 'done':
      setStatus(`✓ 完成 • 總時長 ${m.elapsed.toFixed(0)}s`, 'done');
      $start.disabled = false;
      $stop.disabled = true;
      break;
    case 'stopped':
      setStatus('已停止');
      $start.disabled = false;
      $stop.disabled = true;
      break;
    case 'cleared':
      setStatus('已回到真實 GPS', 'done');
      resetTrail();
      break;
    case 'error':
      setStatus(`error: ${m.message}`, 'error');
      $start.disabled = false;
      $stop.disabled = true;
      break;
  }
}

//
// ---- Button wiring ----
//
$start.addEventListener('click', () => {
  if (!deviceMarker) {
    setStatus('先瞬移到某處當起點', 'error');
    return;
  }
  // Only rwalk supported now — uses current device position as center.
  // Pass the slider values directly so the run starts with whatever the
  // user currently sees, instead of the server snapping back to profile
  // defaults.
  ws.send(JSON.stringify({
    type: 'start',
    profile: $profile.value,
    waypoints: [],
    radius_m: parseInt($radiusSlider.value),
    speed_kmh: parseInt($speedSlider.value),
  }));
});
$stop.addEventListener('click', () => ws.send(JSON.stringify({ type: 'stop' })));
document.getElementById('clearLoc').addEventListener('click', () => {
  ws.send(JSON.stringify({ type: 'clear' }));
});
document.getElementById('jumpButton').addEventListener('click', handleJumpInput);
document.getElementById('jumpInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); handleJumpInput(); }
});

//
// ---- Bookmarks ----
//
function renderBookmarks(list) {
  const ul = document.getElementById('bookmarks');
  ul.replaceChildren();
  list.forEach((bk, i) => {
    const li = document.createElement('li');
    li.title = `${bk.lat.toFixed(5)}, ${bk.lon.toFixed(5)}`;

    // Editable name field — click to focus/edit, blur saves
    const nameEl = document.createElement('input');
    nameEl.type = 'text';
    nameEl.className = 'bk-name';
    nameEl.value = bk.name;
    nameEl.addEventListener('focus', (e) => e.stopPropagation());
    nameEl.addEventListener('click', (e) => e.stopPropagation());
    nameEl.addEventListener('blur', () => {
      const newName = nameEl.value.trim();
      if (newName && newName !== bk.name) {
        renameBookmark(i, newName);
      }
    });
    nameEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); }
    });

    const coords = document.createElement('span');
    coords.className = 'bk-coords';
    coords.textContent = `${bk.lat.toFixed(4)}, ${bk.lon.toFixed(4)}`;

    const rm = document.createElement('button');
    rm.textContent = '✕';
    rm.title = '刪除書籤';
    rm.addEventListener('click', (e) => { e.stopPropagation(); deleteBookmark(i); });

    li.append(nameEl, coords, rm);
    li.addEventListener('click', () => {
      document.getElementById('jumpInput').value = bk.name;
      teleportTo(bk.lat, bk.lon);
      map.setView([bk.lat, bk.lon], 15);
      setStatus(`瞬移到 ${bk.name}`, 'done');
    });
    ul.append(li);
  });
}

function loadBookmarks() {
  fetch('/api/bookmarks')
    .then(r => r.json())
    .then(renderBookmarks)
    .catch(() => {});
}

async function addBookmark() {
  const jumpInput = document.getElementById('jumpInput').value.trim();
  const nameInput = document.getElementById('bookmarkName').value.trim();
  if (!jumpInput) { setStatus('先在「地名或 lat, lon」輸入位置再按 ★', 'error'); return; }

  // Parse coords from jumpInput
  let lat, lon;
  const m = jumpInput.match(/^(-?\d{1,3}(?:\.\d+)?)\s*[,\s]\s*(-?\d{1,3}(?:\.\d+)?)$/);
  if (m) {
    lat = parseFloat(m[1]);
    lon = parseFloat(m[2]);
  } else {
    // Geocode to get coords
    try {
      const url = 'https://nominatim.openstreetmap.org/search'
        + `?format=json&limit=1&q=${encodeURIComponent(jumpInput)}`;
      const res = await fetch(url);
      const hits = await res.json();
      if (!hits.length) { setStatus(`找不到「${jumpInput}」`, 'error'); return; }
      lat = parseFloat(hits[0].lat);
      lon = parseFloat(hits[0].lon);
    } catch (err) {
      setStatus(`geocode 失敗: ${err.message}`, 'error');
      return;
    }
  }

  // Name priority: user-typed name > jump input text > raw coords
  const name = nameInput || jumpInput;

  try {
    const res = await fetch('/api/bookmarks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, lat, lon }),
    });
    const list = await res.json();
    renderBookmarks(list);
    document.getElementById('bookmarkName').value = '';
    setStatus(`★ 已加入書籤「${name}」`, 'done');
  } catch (err) {
    setStatus(`書籤儲存失敗: ${err.message}`, 'error');
  }
}

async function renameBookmark(idx, newName) {
  try {
    const res = await fetch(`/api/bookmarks/${idx}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: newName }),
    });
    const list = await res.json();
    renderBookmarks(list);
    setStatus(`書籤已改名為「${newName}」`, 'done');
  } catch (err) {
    setStatus(`改名失敗: ${err.message}`, 'error');
  }
}

async function deleteBookmark(idx) {
  try {
    const res = await fetch(`/api/bookmarks/${idx}`, { method: 'DELETE' });
    const list = await res.json();
    renderBookmarks(list);
  } catch (err) {
    setStatus(`刪除失敗: ${err.message}`, 'error');
  }
}

document.getElementById('bookmarkAdd').addEventListener('click', addBookmark);
loadBookmarks();

//
// ---- Profile list from backend ----
//
fetch('/api/profiles')
  .then(r => r.json())
  .then(data => {
    profilesMeta = data;
    for (const [name, p] of Object.entries(data)) {
      const opt = document.createElement('option');
      opt.value = name;
      const tag = p.is_random_walk ? ' · 隨機' : '';
      opt.textContent = `${p.label}  ·  ${p.nominal_kmh} km/h${tag}`;
      $profile.append(opt);
    }
    refreshProfileUI();
  })
  .catch(() => setStatus('無法載入 profiles', 'error'));

const $radiusSlider = document.getElementById('radiusSlider');
const $radiusVal = document.getElementById('radiusVal');
const $speedSlider = document.getElementById('speedSlider');
const $speedVal = document.getElementById('speedVal');

function refreshProfileUI() {
  const meta = currentProfileMeta();
  $start.textContent = '🌸 開始漫步種花';
  if (meta.max_radius_m && !$radiusSlider.dataset.initialized) {
    $radiusSlider.value = meta.max_radius_m;
    $radiusVal.textContent = `${meta.max_radius_m} m`;
    $radiusSlider.dataset.initialized = '1';
  }
  if (meta.nominal_kmh && !$speedSlider.dataset.initialized) {
    $speedSlider.value = meta.nominal_kmh;
    $speedVal.textContent = `${meta.nominal_kmh} km/h`;
    $speedSlider.dataset.initialized = '1';
  }
  updateRwalkCircle();
}

$profile.addEventListener('change', refreshProfileUI);

$radiusSlider.addEventListener('input', () => {
  $radiusVal.textContent = `${$radiusSlider.value} m`;
  updateRwalkCircle();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'set_radius', radius_m: parseInt($radiusSlider.value) }));
  }
});

$speedSlider.addEventListener('input', () => {
  $speedVal.textContent = `${$speedSlider.value} km/h`;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'set_speed', speed_kmh: parseInt($speedSlider.value) }));
  }
});

//
// ---- Google Places Autocomplete (optional — needs API key in state.json) ----
//
let placesAutocomplete = null;

async function initGooglePlaces() {
  try {
    const res = await fetch('/api/config');
    const cfg = await res.json();
    const key = cfg.google_maps_api_key;
    if (!key) return;  // no key configured, stick with Nominatim

    // Load Google Maps JS API with Places library
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&libraries=places&callback=_onGoogleReady`;
    script.async = true;
    document.head.append(script);
  } catch {
    // no config endpoint / error, Nominatim fallback
  }
}

// Global callback for Google Maps JS API load
window._onGoogleReady = function() {
  const input = document.getElementById('jumpInput');
  placesAutocomplete = new google.maps.places.Autocomplete(input, {
    fields: ['geometry', 'name', 'formatted_address'],
  });
  placesAutocomplete.addListener('place_changed', () => {
    const place = placesAutocomplete.getPlace();
    if (!place.geometry) return;
    const lat = place.geometry.location.lat();
    const lon = place.geometry.location.lng();
    const name = place.name || place.formatted_address || input.value;
    teleportTo(lat, lon);
    map.setView([lat, lon], 15);
    document.getElementById('bookmarkName').value = name;
    setStatus(`瞬移到 ${name}`, 'done');
  });
  // Style the pac-container to match dark theme
  const style = document.createElement('style');
  style.textContent = `
    .pac-container { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; margin-top: 4px; font-family: inherit; }
    .pac-item { padding: 8px 12px; color: var(--text); border-top: 1px solid var(--border); cursor: pointer; }
    .pac-item:hover, .pac-item-selected { background: var(--panel-2); }
    .pac-item-query { color: var(--text); font-weight: 500; }
    .pac-matched { font-weight: 700; }
    .pac-icon { display: none; }
  `;
  document.head.append(style);
};

initGooglePlaces();
connectWS();
